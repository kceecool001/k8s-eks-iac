name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/terraform-*.yml"

# Least-privilege permissions — only what each step needs
permissions:
  contents: read
  pull-requests: write
  id-token: write   # required for OIDC AWS authentication

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "eu-central-1"

jobs:
  # ── Security gate ────────────────────────────────────────────────────────────
  # Runs before any AWS credentials are configured.
  # A failure here blocks the plan job entirely.
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0  # full history required for Gitleaks commit scanning

      # Detect secrets committed to the repo (API keys, tokens, passwords, etc.)
      - name: Gitleaks — secrets detection
        uses: gitleaks/gitleaks-action@bf2dc8e55639c1e091e9b45970152e4313705814  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Static analysis of Terraform code for misconfigurations and policy violations
      - name: Checkov — IaC security scan
        uses: bridgecrewio/checkov-action@2fd3901c8feb52417f27f0d9800259a106c1ec1e  # v12
        with:
          directory: .
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: false
          skip_check: >-
            CKV_AWS_79

      # Upload Checkov SARIF results to GitHub Security tab
      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif

  # ── Terraform plan ───────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [security]  # plan only runs if security gate passes

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # OIDC — no long-lived AWS keys stored in GitHub secrets
      # Requires an IAM role with a trust policy for this repo/branch
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@b1257c400167d727708335212f95607835cd03fd  # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-terraform-plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b0cc02d63867e0daaa034a47e2cdf5d525a863a1  # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@450193c5abd4cdb17ba9f3ffcfe8f635c4bb6c2a  # v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... output truncated'
              : plan;

            const output = `## Terraform Plan 📋
            | Step | Result |
            |------|--------|
            | Format   | \`${{ steps.fmt.outcome }}\` |
            | Init     | \`${{ steps.init.outcome }}\` |
            | Validate | \`${{ steps.validate.outcome }}\` |
            | Plan     | \`${{ steps.plan.outcome }}\` |

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            *Pushed by @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
