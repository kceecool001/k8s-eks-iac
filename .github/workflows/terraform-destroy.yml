name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm teardown of the EKS cluster'
        required: true
      reason:
        description: "Reason for destroying the cluster (logged in audit trail)"
        required: true

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "eu-central-1"

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation input
        env:
          CONFIRM: ${{ github.event.inputs.confirm }}
        if: env.CONFIRM != 'destroy'
        run: |
          echo "Expected 'destroy', got '${CONFIRM}'. Aborting."
          exit 1

      - name: Audit log
        env:
          ACTOR: ${{ github.actor }}
          REASON: ${{ github.event.inputs.reason }}
          REF: ${{ github.ref }}
        run: |
          echo "Destroy triggered by: ${ACTOR}"
          echo "Reason: ${REASON}"
          echo "Timestamp: $(date -u)"
          echo "Ref: ${REF}"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@b1257c400167d727708335212f95607835cd03fd  # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-terraform-destroy

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b0cc02d63867e0daaa034a47e2cdf5d525a863a1  # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Destroy
        run: terraform destroy -input=false -auto-approve
