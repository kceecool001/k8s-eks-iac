name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/terraform-*.yml"
  # Drift detection — runs a plan daily to catch out-of-band changes
  schedule:
    - cron: "0 6 * * 1-5"  # 06:00 UTC Mon-Fri

permissions:
  contents: read
  id-token: write   # required for OIDC
  issues: write     # required to open drift detection issues

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "eu-central-1"

jobs:
  # ── Security gate ────────────────────────────────────────────────────────────
  # Runs before any AWS credentials are configured.
  # Skipped on scheduled drift runs — no new code to scan.
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Gitleaks — secrets detection
        uses: gitleaks/gitleaks-action@bf2dc8e55639c1e091e9b45970152e4313705814  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkov — IaC security scan
        uses: bridgecrewio/checkov-action@2fd3901c8feb52417f27f0d9800259a106c1ec1e  # v12
        with:
          directory: .
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: false
          skip_check: CKV_AWS_79

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif

  # ── Terraform Plan ───────────────────────────────────────────────────────────
  # Runs after security gate passes. Uploads the plan file as an artifact
  # so the apply job can consume the exact same plan that was reviewed.
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [security]
    if: always() && (needs.security.result == 'success' || needs.security.result == 'skipped')

    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@b1257c400167d727708335212f95607835cd03fd  # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-terraform-plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b0cc02d63867e0daaa034a47e2cdf5d525a863a1  # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -input=false -no-color -detailed-exitcode -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      # Upload plan binary so apply job uses the exact same plan — no re-plan drift
      - name: Upload plan artifact
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

      # On scheduled drift run — open a GitHub issue if changes are detected
      - name: Open drift issue
        if: github.event_name == 'schedule' && steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@450193c5abd4cdb17ba9f3ffcfe8f635c4bb6c2a  # v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8').substring(0, 10000);
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Terraform drift detected — ${new Date().toISOString().split('T')[0]}`,
              labels: ['drift', 'infrastructure'],
              body: `Scheduled drift detection found infrastructure changes not reflected in state.\n\n<details><summary>Plan output</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>`
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  # ── Terraform Apply ──────────────────────────────────────────────────────────
  # Only runs on push (not scheduled drift runs) and only when plan produced
  # changes (exitcode 2). Downloads the exact plan artifact from the plan job.
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [plan]
    if: github.event_name == 'push' && needs.plan.outputs.exitcode == '2'
    environment: stage  # add required reviewers in GitHub Settings → Environments

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@b1257c400167d727708335212f95607835cd03fd  # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-terraform-apply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b0cc02d63867e0daaa034a47e2cdf5d525a863a1  # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      # Download the plan file produced by the plan job
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan
