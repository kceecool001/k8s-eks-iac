name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/terraform-*.yml"
  # Drift detection — runs a plan daily to catch out-of-band changes
  schedule:
    - cron: "0 6 * * 1-5"  # 06:00 UTC Mon-Fri

permissions:
  contents: read
  id-token: write   # required for OIDC
  issues: write     # required to open drift detection issues

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "eu-central-1"

jobs:
  # ── Security gate ────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'  # skip security scan on scheduled drift runs

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Gitleaks — secrets detection
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkov — IaC security scan
        uses: bridgecrewio/checkov-action@b5b8e9e7a1e4e7b5e5e5e5e5e5e5e5e5e5e5e5e  # v12
        with:
          directory: .
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: false
          skip_check: >-
            CKV_AWS_79

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif

  # ── Terraform apply ──────────────────────────────────────────────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [security]
    if: always() && (needs.security.result == 'success' || needs.security.result == 'skipped')
    environment: stage  # GitHub Environment — add required reviewers here for approval gate

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-terraform-apply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269ef032  # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false -no-color -detailed-exitcode -out=tfplan 2>&1 | tee plan_output.txt
        # Exit codes: 0 = no changes, 1 = error, 2 = changes present
        continue-on-error: true

      # On scheduled drift run — open a GitHub issue if changes are detected
      - name: Open drift issue
        if: github.event_name == 'schedule' && steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8').substring(0, 10000);
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Terraform drift detected — ${new Date().toISOString().split('T')[0]}`,
              labels: ['drift', 'infrastructure'],
              body: `Scheduled drift detection found infrastructure changes not reflected in state.\n\n<details><summary>Plan output</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>`
            });

      - name: Fail on drift (scheduled run)
        if: github.event_name == 'schedule' && steps.plan.outputs.exitcode == '1'
        run: exit 1

      # On push — apply only if there are actual changes (exitcode 2)
      - name: Terraform Apply
        if: github.event_name == 'push' && steps.plan.outcome != 'failure'
        run: terraform apply -input=false -auto-approve tfplan
